<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>بوصلة</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>html, body { background: #ece3d0; } @media (prefers-color-scheme: dark) { html, body { background: #14201b; } }</style>
</head>
<body>

<!-- شاشة كلمة السر المشتركة -->
<div id="auth-gate" class="overlay hidden">
  <div class="name-picker-box">
    <div class="sadu-mark"></div>
    <h1>بوصلة <svg class="icon icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></h1>
    <p>أدخلي كلمة السر للدخول</p>
    <form id="auth-form">
      <input type="password" id="auth-password" placeholder="كلمة السر" autocomplete="current-password" required>
      <p id="auth-error" class="auth-error hidden">كلمة السر غير صحيحة</p>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" id="auth-submit-btn">دخول</button>
      </div>
    </form>
  </div>
</div>

<!-- شاشة اختيار الاسم عند أول فتح -->
<div id="name-picker" class="overlay hidden">
  <div class="name-picker-box">
    <div class="sadu-mark"></div>
    <h1>مرحبًا في بوصلة</h1>
    <p>من أنت؟</p>
    <div class="name-picker-buttons">
      <button class="btn btn-aseel" data-name="أسيل">أنا أسيل</button>
      <button class="btn btn-munther" data-name="منذر">أنا منذر</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">

  <header class="app-header">
    <div class="header-right">
      <h1 class="logo">بوصلة</h1>
      <span class="current-user" id="current-user-label"></span>
    </div>
    <div class="header-left">
      <button class="btn-icon" id="theme-toggle-btn" title="تبديل الوضع الداكن/الفاتح"></button>
      <button class="btn-icon" id="switch-user-btn" title="تبديل المستخدم"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h13M17 7l-3-3M17 7l-3 3"/><path d="M20 17H7M7 17l3 3M7 17l3-3"/></svg></button>
    </div>
  </header>
  <div class="sadu-strip"></div>

  <main class="board">

    <!-- أولويات الأسبوع -->
    <section class="board-section priorities-section">
      <div class="section-head">
        <h2>أولويات الأسبوع</h2>
        <span class="section-hint">٣ فقط — أي أولوية جديدة تستبدل واحدة منها</span>
      </div>
      <div class="priorities-row" id="priorities-row"></div>
    </section>

    <!-- المشاريع النشطة -->
    <section class="board-section">
      <div class="section-head">
        <h2>المشاريع النشطة</h2>
        <button class="btn btn-primary btn-sm" id="add-project-btn">+ مشروع جديد</button>
      </div>
      <div class="table-head projects-table-head">
        <span>المشروع</span>
        <span>المسؤول</span>
        <span>الخطوة التالية</span>
        <span>الموعد</span>
        <span></span>
      </div>
      <div id="projects-list" class="projects-list"></div>
    </section>

    <!-- بانتظار قرار منذر -->
    <section class="board-section">
      <div class="section-head">
        <h2>بانتظار قرار منذر</h2>
      </div>
      <form id="decision-form" class="quick-add-row">
        <input type="text" id="decision-title-input" maxlength="200" placeholder="أضيفي بندًا يحتاج قرار منذر...">
        <button type="submit" class="btn btn-secondary btn-sm">إضافة</button>
      </form>
      <div id="decisions-list" class="decisions-list"></div>

      <div class="section-head sub-section-head" id="decisions-done-toggle">
        <h3>القرارات المنتهية</h3>
        <span class="section-caret" id="decisions-done-caret"></span>
      </div>
      <div id="decisions-done-list" class="done-list hidden"></div>
    </section>

    <!-- بنك الأفكار -->
    <section class="board-section">
      <div class="section-head">
        <h2>بنك الأفكار</h2>
      </div>
      <form id="idea-form" class="quick-add-row">
        <input type="text" id="idea-title-input" maxlength="200" placeholder="أضيفي فكرة جديدة...">
        <button type="submit" class="btn btn-secondary btn-sm">إضافة</button>
      </form>
      <div id="ideas-list" class="ideas-list"></div>
    </section>

    <!-- الإنجازات -->
    <section class="board-section done-section">
      <div class="section-head" id="done-toggle">
        <h2>الإنجازات <span id="done-stat" class="done-stat"></span></h2>
        <span class="section-caret" id="done-caret"></span>
      </div>
      <div id="done-list" class="done-list hidden"></div>
    </section>

  </main>

</div>

<!-- نافذة إضافة/تعديل مشروع -->
<div id="project-modal" class="overlay hidden">
  <div class="modal-box">
    <h2 id="project-modal-title">مشروع جديد</h2>
    <form id="project-form">
      <label>اسم المشروع</label>
      <input type="text" id="field-project-title" required maxlength="200">

      <label>المسؤول</label>
      <select id="field-project-owner" required>
        <option value="" disabled selected>— اختر المسؤول —</option>
        <option value="أسيل">أسيل</option>
        <option value="منذر">منذر</option>
        <option value="كلاهما">كلاهما</option>
      </select>

      <label>الخطوة التالية (خطوة واحدة فقط)</label>
      <input type="text" id="field-project-next-action" required maxlength="200" placeholder="مثال: إرسال العرض">

      <label>الموعد (تقديري على الأقل)</label>
      <input type="date" id="field-project-due-date" lang="en" required>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancel-project-btn">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
