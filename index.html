<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توازن</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- شاشة اختيار الاسم عند أول فتح -->
<div id="name-picker" class="overlay hidden">
  <div class="name-picker-box">
    <h1>مرحبًا في توازن</h1>
    <p>من أنت؟</p>
    <div class="name-picker-buttons">
      <button class="btn btn-aseel" data-name="أسيل">أنا أسيل</button>
      <button class="btn btn-munther" data-name="منذر">أنا منذر</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">

  <header class="app-header">
    <div class="header-right">
      <h1 class="logo">توازن</h1>
      <span class="current-user" id="current-user-label"></span>
    </div>
    <div class="header-left">
      <button class="btn-icon" id="theme-toggle-btn" title="تبديل الوضع الداكن/الفاتح">🌙</button>
      <button class="btn-icon" id="switch-user-btn" title="تبديل المستخدم">⇄</button>
    </div>
  </header>

  <div class="filters-bar">
    <div class="filter-group" id="date-filters">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="today">اليوم</button>
      <button class="filter-btn" data-filter="week">هذا الأسبوع</button>
      <button class="filter-btn" data-filter="overdue">متأخرة</button>
    </div>
    <div class="filter-group">
      <select id="assignee-filter" class="assignee-select">
        <option value="all">الكل (حسب الشخص)</option>
        <option value="أسيل">أسيل</option>
        <option value="منذر">منذر</option>
        <option value="كلاهما">كلاهما</option>
      </select>
      <select id="tag-filter" class="assignee-select">
        <option value="all">كل الوسوم</option>
      </select>
    </div>
  </div>

  <main class="task-list" id="task-list"></main>

  <button class="fab" id="add-main-task-btn" title="إضافة مهمة رئيسية">+</button>

</div>

<!-- نافذة إضافة/تعديل مهمة -->
<div id="task-modal" class="overlay hidden">
  <div class="modal-box">
    <h2 id="modal-title">مهمة جديدة</h2>
    <form id="task-form">
      <label>العنوان</label>
      <input type="text" id="field-title" required maxlength="200">

      <label>المسؤول</label>
      <select id="field-assignee">
        <option value="أسيل">أسيل</option>
        <option value="منذر">منذر</option>
        <option value="كلاهما">كلاهما</option>
      </select>

      <label>تاريخ الاستحقاق</label>
      <input type="date" id="field-due-date">

      <label>الحالة</label>
      <select id="field-status">
        <option value="لم تبدأ">لم تبدأ</option>
        <option value="جارية">جارية</option>
        <option value="مكتملة">مكتملة</option>
      </select>

      <label>ملاحظة (اختياري)</label>
      <textarea id="field-notes" maxlength="2000" rows="3"></textarea>

      <label>الوسوم (اختياري)</label>
      <div class="tags-input-wrap">
        <div class="tags-chip-list" id="field-tags-list"></div>
        <input type="text" id="field-tag-input" placeholder="اكتبي وسمًا واضغطي Enter">
      </div>

      <label>ربط بمهمة أخرى (اختياري)</label>
      <select id="field-link-select">
        <option value="">— اختر مهمة —</option>
      </select>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancel-task-btn">إلغاء</button>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
